# CI: тесты + стиль кода и Homebrew-формулы. macOS — целевая платформа
# проекта (формула depends_on :macos), там же есть и python3, и brew.
name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: python3 -m unittest discover -s tests -t tests
      - name: Check code style
        run: |
          python3 -m venv /tmp/ruff-venv
          /tmp/ruff-venv/bin/pip install --quiet ruff
          /tmp/ruff-venv/bin/ruff check .
      - name: Check formula style
        run: brew style Formula/familiar.rb

  # Тег — единственный артефакт, который brew скачивает. Ошибку в нём
  # (не тот код, не та версия) видно только при установке у пользователя,
  # поэтому проверяем сам тег, а не рабочее дерево.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag matches CLI version and formula url
        run: |
          tag="${GITHUB_REF_NAME#v}"
          cli=$(sed -n 's/^VERSION = "\(.*\)"/\1/p' bin/familiar)
          formula=$(sed -n 's|.*/tags/v\(.*\)\.tar\.gz.*|\1|p' Formula/familiar.rb)
          echo "tag=$tag cli=$cli formula=$formula"
          test "$tag" = "$cli" || { echo "::error::bin/familiar VERSION=$cli, тег $tag"; exit 1; }
          test "$tag" = "$formula" || { echo "::error::формула ссылается на v$formula"; exit 1; }
      - name: Tag carries the installable payload
        run: |
          # формула делает libexec.install "bin", "plugins", "config", "docs"
          for path in bin/familiar plugins/review.py config/terminal.conf docs; do
            test -e "$path" || { echo "::error::в теге нет $path"; exit 1; }
          done
