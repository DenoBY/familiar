# Палитра китов «ghostty» (дефолтная): подсветка синтаксиса и фоны
# диффа. Формат: «роль значение», значение — номер 256-цветной
# палитры или #rrggbb (truecolor); текст после значения
# игнорируется. Роль, пропущенная в файле темы, наследуется отсюда.
#
# Оттенки в духе One Dark, которыми kitty-киты жили до появления
# тем. 256-цвет — исторически: truecolor не у всех тем терминала
# ложится ровно, а 256 kitty рисует одинаково.

comment 244       # серый
doc 114           # докстринг — как строка
string 114        # зелёный
number 173        # оранжевый
const 173         # UPPER_CASE
kwconst 173       # True/False/None — та же роль, что у числа
keyword 176       # фиолетовый: if/for/def/return, and/or/not
func 75           # синий: имя функции — в объявлении и в вызове
cls 180           # песочный: классы, типы, исключения
decorator 180     # @property — та же роль, что у класса
self 168          # красноватый: self/this/cls, $var в php
builtin 75        # синий: len/print — это тоже функции
operator 73       # бирюзовый: = + - > и прочие знаки
punct 145         # тусклый: скобки, запятые, точки с запятой
error 203         # красный: то, что лексер не смог разобрать

# Фоны диффа. Слово из word-diff отделяет от своей строки контраст
# ≈2x. Растить его осветлением слова нельзя — на светлом фоне тонет
# сам текст, поэтому темнее делается строка, а слово остаётся
# насыщенным. Строка под курсором тоже приглушена: поверх неё код
# рисуется одним цветом, и на кислотно-ярком фоне он нечитаем.
add_bg 22
del_bg 52
add_word_bg 28    # ярче — на изменившихся словах (word-diff)
del_word_bg 88
add_focus_bg 34   # строка под курсором: ярче своего фона
del_focus_bg 124
cursor_bg 238     # строка под курсором там, где своего фона нет
sel_range_bg 25   # выделение: читается и поверх add/del
