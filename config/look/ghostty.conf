# Тема Ghostty (дефолтная палитра) для kitty
# Источник: ghostty +show-config --default

font_family JetBrains Mono
font_size 12.0

# Заголовок окна под цвет фона терминала
macos_titlebar_color background
# Не дублировать титул в титлбаре (он и так виден в табе)
macos_show_window_title_in menubar

foreground #ffffff
background #282c34

# ANSI 0-7
color0 #1d1f21
color1 #cc6666
color2 #b5bd68
color3 #f0c674
color4 #81a2be
color5 #b294bb
color6 #8abeb7
color7 #c5c8c6

# ANSI 8-15 (bright)
color8  #666666
color9  #d54e53
color10 #b9ca4a
color11 #e7c547
color12 #7aa6da
color13 #c397d8
color14 #70c0b1
color15 #eaeaea
