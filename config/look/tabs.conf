# Табы сверху, скруглённые «пилюли» в стиле Ghostty
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style round
tab_bar_align left
tab_bar_min_tabs 2
tab_bar_margin_height 4.0 0.0
tab_title_max_length 30

# Титул «✳ тема» — это Claude Code (он сам так подписывает окно):
# такому табу добавляем имя папки проекта и срезаем «✳»; титулы без
# «✳» (обычный шелл, ssh) не трогаем.
tab_title_template " {index}: {((tab.active_wd.rsplit('/', 1)[-1] + '❘') if tab.active_wd else '') + title.removeprefix('✳ ') if title.startswith('✳') else title} "
active_tab_font_style bold
inactive_tab_font_style normal

# Цвета: активный таб — светлая пилюля, неактивные — приглушённые
active_tab_background   #4a5160
active_tab_foreground   #ffffff
inactive_tab_background #2f343f
inactive_tab_foreground #9aa0aa

# Переход к вкладке по номеру: cmd+1 … cmd+9 (номер = {index} в заголовке таба)
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9
