# Тема Darcula (JetBrains) для kitty.
#
# Источник — схема "Darcula" из intellij-community:
# platform/platform-resources/src/DefaultColorSchemesManager.xml
# (ANSI — атрибуты CONSOLE_*_OUTPUT, фон — CONSOLE_BACKGROUND_KEY,
# текст — CONSOLE_NORMAL_OUTPUT, курсор — CARET_COLOR,
# выделение — SELECTION_BACKGROUND).
#
# Терминал — это консоль, а не редактор: foreground берём из
# CONSOLE_NORMAL_OUTPUT (нейтральный #bbbbbb), а не из TEXT (#a9b7c6) —
# редакторский текст холодный, и обычный вывод от него отдаёт голубым.
#
# Подключается ПОСЛЕ look/ghostty.conf и look/tabs.conf, поэтому
# переопределяет их цвета и форму табов; шрифт и настройки титлбара
# берутся из ghostty.conf.
# vim:fileencoding=utf-8:ft=conf

foreground #bbbbbb
background #2b2b2b

cursor #bbbbbb
selection_background #214283
selection_foreground none

# ANSI 0-7
color0 #000000
color1 #f0524f
color2 #5c962c
color3 #a68a0d
color4 #3993d4
color5 #a771bf
color6 #00a3a3
color7 #808080

# ANSI 8-15 (bright)
color8  #595959
color9  #ff4050
color10 #4fc414
color11 #e5bf00
color12 #1fb0ff
color13 #ed7eed
color14 #00e5e5
color15 #ffffff

# Табы: форма — powerline round из look/tabs.conf, как в теме ghostty
# (край вкладки выпуклый, стык с соседней — вогнутый). Здесь только
# цвета.
#
# Контурную «скобку» между вкладками kitty рисует ровно тогда, когда
# фоны соседей СОВПАДАЮТ, — заполненный полукруг ему тогда не из чего
# сделать. Поэтому неактивные вкладки на волосок светлее полосы: глиф
# снова заполненный, а разницы в два тона глаз не видит.
#
# Оттенки серые, без синевы: активная вкладка светлее фона окна
# (GUTTER_BACKGROUND). Цвет полосы в схеме редактора не задан (она про
# код, не про UI) — #1e1f22 подобран на глаз.
tab_bar_background      #1e1f22
active_tab_background   #313335
active_tab_foreground   #bbbbbb
inactive_tab_background #212226
inactive_tab_foreground #808080
