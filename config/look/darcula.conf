# Тема Darcula (JetBrains) для kitty.
#
# Источник — схема "Darcula" из intellij-community:
# platform/platform-resources/src/DefaultColorSchemesManager.xml
# (ANSI — атрибуты CONSOLE_*_OUTPUT, фон — CONSOLE_BACKGROUND_KEY,
# текст — TEXT, курсор — CARET_COLOR, выделение — SELECTION_BACKGROUND).
#
# Подключается ПОСЛЕ look/ghostty.conf и переопределяет только цвета:
# шрифт и настройки титлбара берутся оттуда.
# vim:fileencoding=utf-8:ft=conf

foreground #a9b7c6
background #2b2b2b

cursor #bbbbbb
selection_background #214283
selection_foreground none

# ANSI 0-7
color0 #000000
color1 #f0524f
color2 #5c962c
color3 #a68a0d
color4 #3993d4
color5 #a771bf
color6 #00a3a3
color7 #808080

# ANSI 8-15 (bright)
color8  #595959
color9  #ff4050
color10 #4fc414
color11 #e5bf00
color12 #1fb0ff
color13 #ed7eed
color14 #00e5e5
color15 #ffffff
