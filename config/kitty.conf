# Конфиг kitty — только include'ы; настройки разнесены по файлам рядом.
# Для ручной установки (`cp config/*.conf ~/.config/kitty`). При установке
# через familiar этот файл не используется: `familiar enable` пишет include в
# твой существующий kitty.conf и сам добавляет китены.
# vim:fileencoding=utf-8:ft=conf

# Внешний вид + сплиты/табы + раскладка (без плагинов-kitten).
include terminal.conf

# Китены подключаются командой `familiar enable` (пути к kitten kitty требует
# абсолютными — их подставляет familiar). Ручной вариант — сгенерировать блок:
#   familiar enable --kittens
