# Нужные встроенные дефолты kitty, возвращённые после clear_all_shortcuts.
# clear_all снимает ВСЕ дефолты (иначе не убрать липкий cmd+w -> close_tab с его
# ascii-fallback, ломавший close_window на русской раскладке) — тут только macOS-
# эссеншелы на cmd. Кросс-платформенные ctrl+shift (kitty_mod) не возвращаю: не нужны.
# --allow-fallback=ascii там, где важно ловить физическую клавишу на русской раскладке.
clear_all_shortcuts yes

# Шрифт
map --allow-fallback=shifted cmd+= change_font_size all +2.0
map --allow-fallback=shifted cmd++ change_font_size all +2.0
map --allow-fallback=shifted cmd+- change_font_size all -2.0
map --allow-fallback=shifted cmd+0 change_font_size all 0

# Окна / вкладки
map --allow-fallback=shifted,ascii cmd+n new_os_window
map --allow-fallback=shifted,ascii cmd+t new_tab
map --allow-fallback=shifted cmd+enter new_window
map --allow-fallback=shifted cmd+shift+[ previous_tab
map --allow-fallback=shifted cmd+shift+] next_tab
map --allow-fallback=shifted,ascii cmd+shift+i set_tab_title

# Буфер обмена
map --allow-fallback=shifted,ascii cmd+c copy_or_noop
map --allow-fallback=shifted,ascii cmd+v paste_from_clipboard

# Поиск / очистка экрана
map --allow-fallback=shifted,ascii cmd+f search_scrollback
map --allow-fallback=shifted cmd+k clear_terminal to_cursor active
map --allow-fallback=shifted cmd+l clear_terminal last_command active

# Скролл
map --allow-fallback=shifted cmd+up scroll_line_up smooth
map --allow-fallback=shifted cmd+down scroll_line_down smooth
map --allow-fallback=shifted cmd+page_up scroll_page_up
map --allow-fallback=shifted cmd+page_down scroll_page_down
map --allow-fallback=shifted cmd+home scroll_home
map --allow-fallback=shifted cmd+end scroll_end

# Приложение
map --allow-fallback=shifted cmd+q quit
map --allow-fallback=shifted cmd+h hide_macos_app
map --allow-fallback=shifted cmd+m minimize_macos_window

# Конфиг
map --allow-fallback=shifted cmd+, edit_config_file
map --allow-fallback=shifted cmd+ctrl+, load_config_file
