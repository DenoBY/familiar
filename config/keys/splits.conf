# Сплиты окон (панелей) в стиле Ghostty.
# splits — основной layout; stack — «развернуть» активный сплит на весь экран.
enabled_layouts splits:split_axis=horizontal,stack

# Создать сплит (в текущей рабочей папке)
map cmd+d       launch --location=vsplit --cwd=current
map cmd+shift+d launch --location=hsplit --cwd=current
# Дубли для русской раскладки (D = в)
map cmd+в       launch --location=vsplit --cwd=current
map cmd+shift+в launch --location=hsplit --cwd=current

# Переход между сплитами — Cmd+Shift+стрелки (как в Ghostty)
map cmd+shift+left  neighboring_window left
map cmd+shift+right neighboring_window right
map cmd+shift+up    neighboring_window up
map cmd+shift+down  neighboring_window down

# Развернуть активный сплит на весь экран и обратно
map cmd+shift+enter toggle_layout stack

# Cmd+W — закрыть панель; последняя в табе -> закроется таб, затем окно.
# allow-fallback=ascii, а не кириллический дубль: на русской раскладке физическая W
# даёт «ц», и прямой map cmd+ц на macOS съедает input method (проверено через
# --debug-keyboard: «handled as shortcut» без действия). ascii-fallback заранее
# конвертит физическую W в латинскую и матчит close_window — путь надёжный.
# Работает только потому, что дефолтный cmd+w -> close_tab снят в restored-defaults.conf.
map --allow-fallback=ascii cmd+w       close_window
# Cmd+Shift+W — закрыть весь таб целиком (со всеми сплитами)
map --allow-fallback=ascii cmd+shift+w close_tab
