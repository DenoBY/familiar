# Проброс Shift+клика в программу, захватившую мышь (grabbed).
# По умолчанию kitty даже в grabbed-режиме обрабатывает shift+left сам
# (mouse_selection / mouse_handle_click), поэтому киты события не видят.
# Маппинг «в никуда» = unmap ровно для grabbed; в обычном шелле
# (ungrabbed) Shift-выделение kitty работает как раньше.
mouse_map shift+left press grabbed
mouse_map shift+left doublepress grabbed
mouse_map shift+left triplepress grabbed
mouse_map shift+left click grabbed
