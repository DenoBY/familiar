# Настройки терминала (внешний вид + раскладка) — без плагинов-kitten.
# Это то, что подключает `familiar enable --all`. Китены при этом добавляет
# сам familiar (в ~/.config/kitty/familiar.conf), поэтому здесь их нет.
#
# `include` резолвится относительно ЭТОГО файла (в отличие от пути к kitten,
# который kitty резолвит от ~/.config/kitty) — поэтому keys/look берутся по
# относительному пути из любой точки установки.
# vim:fileencoding=utf-8:ft=conf

# Сброс встроенных шорткатов + возврат нужных дефолтов (первым — чтобы дефолтный
# cmd+w -> close_tab не перехватывал физическую W и close_window работал на русской).
include keys/restored-defaults.conf

# Тема Ghostty (внешний вид / шрифты)
include look/ghostty.conf

# Ctrl+хоткеи на русской раскладке
include keys/russian-ctrl.conf

# Сплиты окон
include keys/splits.conf

# Мышь: проброс Shift+клика китам
include keys/mouse.conf

# Табы сверху
include look/tabs.conf
